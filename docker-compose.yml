version: "3.8"
services:
  meridian-ai:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Add necessary environment variables here for local testing
      - ENVIRONMENT=local
      - GCP_PROJECT=your-project-id
      - GCP_REGION=us-central1
      - GCS_BUCKET_NAME=your-bucket-name
      - VITE_API_URL=http://localhost:8080
    env_file:
      - .env
